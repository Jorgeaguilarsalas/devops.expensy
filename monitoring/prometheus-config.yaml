apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: taco-monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: 'expensy-backend'
        metrics_path: '/metrics'
        static_configs:
          - targets: ['backend-service.taco-expensy.svc.cluster.local:80']