apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: taco-monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
      - name: grafana
        image: grafana/grafana:latest
        ports:
          - containerPort: 3000
        env:
        - name: GF_SECURITY_ADMIN_PASSWORD
          value: "taco-devops-2026"
---
apiVersion: v1
kind: Service
metadata:
  name: grafana-service
  namespace: taco-monitoring
spec:
  selector:
    app: grafana
  ports:
    - port: 80
      targetPort: 3000